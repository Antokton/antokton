<!doctype html>
<html lang="sq">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1020" />
    <title>Antokton Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0b1020;
        color: #fff;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(rgba(11, 16, 32, 0.74), rgba(11, 16, 32, 0.9)),
          url("/local-assets/122fac317_Antoktonfrontpage.jpg") center/cover no-repeat;
      }

      main {
        width: min(100%, 420px);
        text-align: center;
      }

      img {
        width: 144px;
        max-width: 48vw;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 10vw, 44px);
        line-height: 0.95;
      }

      p {
        margin: 0;
        color: rgba(255, 255, 255, 0.78);
        font-size: 16px;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/antokton-192.png" alt="Antokton" />
      <h1>Antokton</h1>
      <p>Je offline. Faqet dhe imazhet që janë hapur më parë ruhen në telefon dhe do të shfaqen sapo të jenë në cache.</p>
    </main>
  </body>
</html>
