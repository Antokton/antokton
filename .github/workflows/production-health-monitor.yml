name: Production Health Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: read

concurrency:
  group: production-health-monitor
  cancel-in-progress: false

jobs:
  health:
    name: Check antokton.com health
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify production health contract
        run: node backend/scripts/monitor-production-health.js --base https://antokton.com --expect-db-mode postgres --expect-schemas 60
